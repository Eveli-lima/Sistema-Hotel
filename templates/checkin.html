{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm mx-auto" style="max-width: 700px;">
    <div class="card-header bg-success text-white">
        <h4 class="mb-0">Novo Check-in</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            <h5 class="text-primary mb-3">Dados do Cliente</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Nome Completo</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">E-mail</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
            </div>
            
            <hr class="text-muted">
            <h5 class="text-primary mb-3">Endereço e Contato</h5>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Telefone</label>
                    <input type="tel" name="telefone" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">CEP</label>
                    <input type="text" name="cep" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Cidade</label>
                    <input type="text" name="cidade" class="form-control" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Rua / Logradouro</label>
                    <input type="text" name="rua" class="form-control" required>
                </div>
                <div class="col-md-2 mb-3">
                    <label class="form-label fw-bold">Número</label>
                    <input type="text" name="numero" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Bairro</label>
                    <input type="text" name="bairro" class="form-control" required>
                </div>
            </div>

            <hr>
            <h5 class="text-primary mb-3">Dados da Estadia</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Data de Entrada</label>
                    <input type="date" name="data_entrada" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Data de Saída</label>
                    <input type="date" name="data_saida" class="form-control" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Selecione o Quarto</label>
                <select name="numero_quarto" class="form-select" required>
                    <option value="" disabled selected>Escolha um quarto do catálogo...</option>
                    <option value="101">Quarto 101 - Standard (R$ 150/dia)</option>
                    <option value="102">Quarto 102 - Standard (R$ 150/dia)</option>
                    <option value="103">Quarto 103 - Standard (R$ 150/dia)</option>
                    <option value="201">Quarto 201 - VIP (R$ 200/dia)</option>
                    <option value="202">Quarto 202 - VIP (R$ 200/dia)</option>
                    <option value="301">Quarto 301 - Presidencial (R$ 300/dia)</option>
                </select>
                <small class="text-muted">*Reservas com mais de 3 meses de antecedência garantem 30% de desconto!</small>
            </div>
                
            <div class="mb-4">
                <label class="form-label fw-bold">Serviços Antecipados</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="servicos" value="spa">
                    <label class="form-check-label">Spa (R$ 150)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="servicos" value="lavanderia">
                    <label class="form-check-label">Lavanderia (R$ 80)</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="servicos" value="cama_extra">
                    <label class="form-check-label">Cama Extra: R$ 80,00 (Por diária)</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="servicos" value="taxa_pet">
                    <label class="form-check-label">Taxa Pet: R$ 120,00</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="servicos" value="cafe_manha">
                    <label class="form-check-label">Café da Manhã no Quarto: R$ 45,00 (Por dia servido)</label>
                </div>
            </div>
            
            <div class="d-flex justify-content-between">
                <a href="/" class="btn btn-secondary">Voltar</a>
                <button type="submit" class="btn btn-success">Aprovar Check-in</button>
            </div>
            
        </form>
    </div>
</div>
{% endblock %}
