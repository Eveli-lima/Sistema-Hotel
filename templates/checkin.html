{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
    <!-- Cabeçalho do Card -->
    <div class="bg-slate-900 px-8 py-5 border-b border-slate-800">
        <h4 class="text-xl font-bold text-amber-400"><i class="fa-solid fa-bell-concierge mr-2"></i> Ficha de Check-in</h4>
        <p class="text-slate-400 text-sm mt-1">Preencha os dados do hóspede e da estadia</p>
    </div>
    
    <div class="p-8">
        <form method="POST" class="space-y-8">
            <!-- Seção: Dados Pessoais -->
            <div>
                <h5 class="text-sm font-bold uppercase tracking-wider text-slate-400 border-b border-slate-100 pb-2 mb-4">Dados do Cliente</h5>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Nome Completo</label>
                        <input type="text" name="nome" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">E-mail</label>
                        <input type="email" name="email" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" required>
                    </div>
                </div>
            </div>

            <!-- Seção: Endereço -->
            <div>
                <h5 class="text-sm font-bold uppercase tracking-wider text-slate-400 border-b border-slate-100 pb-2 mb-4">Endereço e Contato</h5>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Telefone</label>
                        <input type="tel" name="telefone" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">CEP</label>
                        <input type="text" name="cep" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Cidade</label>
                        <input type="text" name="cidade" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" required>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <div class="md:col-span-6">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Rua / Logradouro</label>
                        <input type="text" name="rua" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" required>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Número</label>
                        <input type="text" name="numero" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" required>
                    </div>
                    <div class="md:col-span-4">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Bairro</label>
                        <input type="text" name="bairro" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" required>
                    </div>
                </div>
            </div>

            <!-- Seção: Estadia e Quarto -->
            <div>
                <h5 class="text-sm font-bold uppercase tracking-wider text-slate-400 border-b border-slate-100 pb-2 mb-4">Dados da Estadia</h5>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Data de Entrada</label>
                        <input type="date" name="data_entrada" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all text-slate-600" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Data de Saída</label>
                        <input type="date" name="data_saida" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all text-slate-600" required>
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Selecione o Quarto</label>
                    <select name="numero_quarto" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all bg-white" required>
                        <option value="" disabled selected>Escolha um quarto do catálogo...</option>
                        <option value="101">Quarto 101 - Standard (R$ 150/dia)</option>
                        <option value="102">Quarto 102 - Standard (R$ 150/dia)</option>
                        <option value="103">Quarto 103 - Standard (R$ 150/dia)</option>
                        <option value="201">Quarto 201 - VIP (R$ 200/dia)</option>
                        <option value="202">Quarto 202 - VIP (R$ 200/dia)</option>
                        <option value="301">Quarto 301 - Presidencial (R$ 300/dia)</option>
                    </select>
                    <p class="text-xs text-amber-600 mt-2 font-medium"><i class="fa-solid fa-circle-info"></i> Dica: Reservas com >90 dias de antecedência ganham 15% de desconto.</p>
                </div>
            </div>

            <!-- Seção: Serviços Adicionais -->
            <div class="bg-slate-50 p-6 rounded-xl border border-slate-100">
                <label class="block text-sm font-semibold text-slate-700 mb-4">Serviços Antecipados (Opcional)</label>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                    <label class="flex items-center p-3 border border-slate-200 rounded-lg bg-white hover:border-emerald-400 cursor-pointer transition-all">
                        <input type="checkbox" name="servicos" value="spa" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500">
                        <span class="ml-3 text-sm text-slate-700">Spa (+R$ 150)</span>
                    </label>
                    <label class="flex items-center p-3 border border-slate-200 rounded-lg bg-white hover:border-emerald-400 cursor-pointer transition-all">
                        <input type="checkbox" name="servicos" value="lavanderia" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500">
                        <span class="ml-3 text-sm text-slate-700">Lavanderia (+R$ 80)</span>
                    </label>
                    <label class="flex items-center p-3 border border-slate-200 rounded-lg bg-white hover:border-emerald-400 cursor-pointer transition-all">
                        <input type="checkbox" name="servicos" value="cama_extra" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500">
                        <span class="ml-3 text-sm text-slate-700">Cama Extra (+R$ 80)</span>
                    </label>
                    <label class="flex items-center p-3 border border-slate-200 rounded-lg bg-white hover:border-emerald-400 cursor-pointer transition-all">
                        <input type="checkbox" name="servicos" value="taxa_pet" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500">
                        <span class="ml-3 text-sm text-slate-700">Taxa Pet (+R$ 120)</span>
                    </label>
                    <label class="flex items-center p-3 border border-slate-200 rounded-lg bg-white hover:border-emerald-400 cursor-pointer transition-all">
                        <input type="checkbox" name="servicos" value="cafe_manha" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500">
                        <span class="ml-3 text-sm text-slate-700">Café da Manhã (+R$ 45)</span>
                    </label>
                </div>
            </div>

            <!-- Botões -->
            <div class="flex items-center justify-between pt-6 border-t border-slate-100">
                <a href="/" class="px-6 py-2 border border-slate-300 text-slate-600 rounded-lg hover:bg-slate-50 transition-colors font-medium">Cancelar</a>
                <button type="submit" class="px-6 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition-colors shadow-sm font-medium">
                    Confirmar Check-in
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
