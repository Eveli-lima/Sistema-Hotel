{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
    <div class="bg-slate-900 px-8 py-5 border-b border-slate-800">
        <h4 class="text-xl font-bold text-amber-400">
            <i class="fa-solid fa-cart-plus mr-2"></i> Lançamento de Consumo
        </h4>
        <p class="text-slate-400 text-sm mt-1">Registre serviços extras na ficha do hóspede</p>
    </div>

    <div class="p-8">
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Selecione a Reserva Ativa</label>
                <div class="relative">
                    <select name="codigo" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all bg-white appearance-none cursor-pointer" required>
                        <option value="" disabled selected>Escolha um hóspede ativo...</option>
                        {% for cod, reserva in reservas.items() %}
                            <option value="{{ cod }}">{{ cod }} - {{ reserva.hospede }}</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                        <i class="fa-solid fa-chevron-down text-xs"></i>
                    </div>
                </div>
                <p class="text-xs text-slate-400 mt-2 italic">Apenas reservas com check-in ativo aparecem nesta lista.</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Serviço Consumido</label>
                <div class="relative">
                    <select name="servico" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all bg-white appearance-none cursor-pointer" required>
                        <option value="1">🛒 Frigobar (R$ 50,00)</option>
                        <option value="2">🧺 Lavanderia (R$ 80,00)</option>
                        <option value="3">💆 Spa (R$ 150,00)</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                        <i class="fa-solid fa-chevron-down text-xs"></i>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between pt-6 border-t border-slate-100">
                <a href="/" class="px-6 py-2 border border-slate-300 text-slate-600 rounded-lg hover:bg-slate-50 transition-colors font-medium text-sm">
                    Voltar ao Menu
                </a>
                <button type="submit" class="px-8 py-3 bg-amber-500 text-white rounded-lg hover:bg-amber-600 shadow-lg shadow-amber-500/30 hover:shadow-amber-500/50 transition-all hover:-translate-y-0.5 flex items-center gap-2 font-bold">
                    <i class="fa-solid fa-check"></i> Registrar Consumo
                </button>
            </div>
        </form>
    </div>
</div>

<div class="max-w-2xl mx-auto mt-6 grid grid-cols-3 gap-4">
    <div class="bg-white p-4 rounded-xl border border-slate-100 text-center shadow-sm">
        <p class="text-xs text-slate-400 uppercase font-bold">Frigobar</p>
        <p class="text-lg font-bold text-slate-700">R$ 50</p>
    </div>
    <div class="bg-white p-4 rounded-xl border border-slate-100 text-center shadow-sm">
        <p class="text-xs text-slate-400 uppercase font-bold">Lavanderia</p>
        <p class="text-lg font-bold text-slate-700">R$ 80</p>
    </div>
    <div class="bg-white p-4 rounded-xl border border-slate-100 text-center shadow-sm">
        <p class="text-xs text-slate-400 uppercase font-bold">Spa</p>
        <p class="text-lg font-bold text-slate-700">R$ 150</p>
    </div>
</div>
{% endblock %}
