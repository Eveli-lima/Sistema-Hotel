{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm mx-auto" style="max-width: 600px;">
    <div class="card-header bg-warning">
        <h4 class="mb-0 text-dark">Lançamento de Consumo</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Selecione a Reserva</label>
                <select name="codigo" class="form-select" required>
                    <option value="" disabled selected>Escolha um hóspede ativo...</option>
                    {% for cod, reserva in reservas.items() %}
                        <option value="{{ cod }}">{{ cod }} - {{ reserva.hospede }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Serviço Consumido</label>
                <select name="servico" class="form-select" required>
                    <option value="1">Frigobar (R$ 50)</option>
                    <option value="2">Lavanderia (R$ 80)</option>
                    <option value="3">Spa (R$ 150)</option>
                </select>
            </div>
            <div class="d-flex justify-content-between">
                <a href="/" class="btn btn-secondary">Voltar</a>
                <button type="submit" class="btn btn-warning fw-bold">Registrar Consumo</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
